<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D2A85C" />
      <stop offset="50%" stop-color="#5a4010" />
      <stop offset="100%" stop-color="#D2A85C" />
    </linearGradient>
    <linearGradient id="inner-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C2333" />
      <stop offset="100%" stop-color="#161B22" />
    </linearGradient>
  </defs>

  <!-- Outer Ring (Match the Avatar styling from the portfolio) -->
  <circle cx="50" cy="50" r="48" fill="url(#bg-grad)" />
  
  <!-- Inner Circle -->
  <circle cx="50" cy="50" r="44" fill="url(#inner-grad)" />

  <!-- The "M" text -->
  <text 
    x="50" 
    y="70" 
    font-family="Fraunces, Georgia, serif" 
    font-size="60" 
    font-weight="bold" 
    fill="#D2A85C" 
    text-anchor="middle"
  >M</text>
</svg>
